name: DecisionDiffuser
nn_diffusion: 
  _target_: CleanDiffuser.nn_diffusion.MLP
  # Placeholder for MLP architecture
  # actual CleanDiffuser model will be instantiated in the wrapper
  d_in: 14 # obs_dim + action_dim (adjusted in code)
  d_out: 14
  d_model: 256
  n_layers: 4

diffusion:
  steps: 20
  beta_schedule: "cosine"

lr: 2e-4
weight_decay: 1e-4
ar_inv: false # autoregressive inverse dynamics
